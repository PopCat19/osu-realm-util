name: Nix build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: nix fmt check
        run: nix fmt -- --check .

      - name: nix build
        run: nix build

      - name: smoke test
        run: nix run . -- --help
